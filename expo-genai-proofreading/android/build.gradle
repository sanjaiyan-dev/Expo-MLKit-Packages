plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.genaiproofreading'
version = '0.1.0'

android {
  namespace "expo.modules.genaiproofreading"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
  dependencies {
    implementation("com.google.mlkit:genai-proofreading:1.0.0-beta1")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-guava:1.11.0-rc01")
  }
}
